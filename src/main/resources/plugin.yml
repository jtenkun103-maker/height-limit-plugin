name: HeightLimitPlugin
version: 1.0.0
main: com.example.heightlimit.HeightLimitPlugin
api-version: '1.21'
description: 建築可能な高度の上限を1000に拡張するプラグイン
author: YourName

commands:
  heightlimit:
    description: 現在の高度制限設定を確認します
    usage: /heightlimit
    permission: heightlimit.info

permissions:
  heightlimit.info:
    description: 高度制限の情報を確認する
    default: true
  heightlimit.bypass:
    description: 高度制限をバイパスする（管理者用）
    default: op
